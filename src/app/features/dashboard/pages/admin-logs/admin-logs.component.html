<div class="logs-container">

  <div class="filtros-header">
    
    <div class="filter-group">
      <label>Buscar por Usuario</label>
      <div class="input-search-container">
        <input
          type="text"
          placeholder="Buscar por ID"
          [(ngModel)]="filtros.usuarioOrId"
          (ngModelChange)="buscar()">
      </div>
    </div>

    <div class="filter-group">
      <label>Tabla Afectada</label>
      <select [(ngModel)]="filtros.modulo" (ngModelChange)="buscar()">
        <option value="">Todas</option>
        <option value="MASCOTAS">Mascota</option>
        <option value="CLIENTES">Cliente</option>
        <option value="COMPROBANTE">Comprobante Pago</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Acción Realizada</label>
      <select [(ngModel)]="filtros.accion" (ngModelChange)="buscar()">
        <option value="">Todas</option>
        <option value="REGISTRO">Registro</option>
        <option value="ACTUALIZAR">UPDATE</option>
        <option value="DELETE">DELETE</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Fecha de Registro</label>
      <input
        type="date"
        [(ngModel)]="filtros.fecha"
        (ngModelChange)="buscar()">
    </div>

    <div class="filter-actions">
      <button class="btn-limpiar" (click)="limpiarFiltros()">
        Limpiar
      </button>
    </div>

  </div>

  <div class="table-responsive">
    <table class="custom-table">
      <thead>
        <tr>
          <th>FECHA Y HORA</th>
          <th>USUARIO OPERADOR</th>
          <th>TABLA AFECTADA</th>
          <th>ACCIÓN SQL</th>
          <th>DESCRIPCIÓN</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let log of logs">
          
          <td class="cell-date">
            <span class="date-day">{{ log.fecha | date:'dd/MM/yyyy' }}</span>
            <span class="date-time">{{ log.fecha | date:'HH:mm:ss' }}</span>
          </td>

          <td>
            <div *ngIf="log.nombreCompleto; else cargandoUser">
              <span class="user-name">{{ log.nombreCompleto }}</span>
              <span class="user-id">ID: {{ log.idUsuario }}</span>
            </div>
            <ng-template #cargandoUser>
              <span class="loading-text">Cargando...</span>
            </ng-template>
          </td>

          <td>
            <span class="badge-pill tab-pill">
              {{ log.modulo }}
            </span>
          </td>

          <td>
            <span class="badge-pill action-pill">
              {{ log.accion }}
            </span>
          </td>

          <td class="cell-desc">
            {{ log.descripcion }}
          </td>

        </tr>

        <tr *ngIf="logs.length === 0">
          <td colspan="5" class="no-records">
            No existen registros
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
