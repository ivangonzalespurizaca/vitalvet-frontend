<div class="modal-overlay" (click)="cerrar.emit()">
  <div class="modal-content" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h2>{{ idMascota ? 'Editar Mascota' : 'Registrar Mascota' }}</h2>
      <button class="btn-close" (click)="cerrar.emit()">×</button>
    </div>

    @if (cargandoDatos()) {
      <div class="loading">Cargando información...</div>
    } @else {
      <form [formGroup]="formulario" (ngSubmit)="guardar()">

        <div class="photo-upload-section">
          <div class="avatar-preview">
            @if (imagenPreview()) {
              <img [src]="imagenPreview()" alt="Foto de la mascota">
            } @else {
              <span class="placeholder-icon">🐾</span>
            }
          </div>

          <input type="file"
                 #fileInput
                 accept="image/*"
                 style="display: none;"
                 (change)="onFileSelected($event)">

          <button type="button" class="btn-upload" (click)="fileInput.click()">
            Subir Foto
          </button>
        </div>

        <div class="form-group">
          <label>Nombres</label>
          <input type="text" formControlName="nombreMascota" placeholder="Nombre de tu mascota">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Especie</label>
            <select formControlName="idEspecie">
              <option [ngValue]="null">Selecciona Especie</option>
              @for (e of especies; track e.idEspecie) {
                <option [value]="e.idEspecie">{{ e.nombreEspecie }}</option>
              }
            </select>
          </div>
          <div class="form-group">
            <label>Raza</label>
            <select formControlName="idRaza">
              <option [ngValue]="null">Selecciona Raza</option>
              @for (r of razasFiltradas; track r.idRaza) {
                <option [value]="r.idRaza">{{ r.nombreRaza }}</option>
              }
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Sexo</label>
            <select formControlName="sexo">
              <option value="">Selecciona Sexo</option>
              <option value="MACHO">Macho</option>
              <option value="HEMBRA">Hembra</option>
            </select>
          </div>
          <div class="form-group">
            <label>Fecha de nacimiento</label>
            <input type="date" formControlName="fechaNacimiento">
          </div>
        </div>

        <div class="form-group">
          <label>Peso Actual (Kg)</label>
          <input type="number" step="0.1" formControlName="pesoActual" placeholder="0.0">
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-cancel" (click)="cerrar.emit()">Cancelar</button>
          <button type="submit" class="btn-submit" [disabled]="guardando()">
            {{ guardando() ? 'Procesando...' : (idMascota ? 'Actualizar' : 'Registrar') }}
          </button>
        </div>

      </form>
    }

  </div>
</div>
