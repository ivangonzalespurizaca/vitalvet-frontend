<div class="login-container">
  <div class="login-card">
    <img src="https://res.cloudinary.com/dfid8iuf3/image/upload/v1782138519/vitalvetlogo2_Mesa_de_trabajo_1_ijr8op.png" 
         alt="Logo Vital Vet" class="login-logo">
    <p>Restablecer Contraseña</p>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Nueva Contraseña</label>
        <input type="password" formControlName="nuevaContrasenia" placeholder="Mínimo 6 caracteres">
      </div>

      <div class="form-group">
        <label>Confirmar Nueva Contraseña</label>
        <input type="password" formControlName="confirmarContrasenia" placeholder="Repite la contraseña">
      </div>

      @if (
        resetForm.get('nuevaContrasenia')?.hasError('minlength') &&
        resetForm.get('nuevaContrasenia')?.touched
      ) {
        <small class="error-msg">
          La contraseña debe tener al menos 6 caracteres.
        </small>
      }
      @else if (contraseniaNoCoincide) {
        <small class="error-msg">
          Las contraseñas no coinciden.
        </small>
      }

      <button type="submit" [disabled]="resetForm.invalid || cargando" class="btn-login">
        {{ cargando ? 'Actualizando...' : 'Guardar Nueva Contraseña' }}
      </button>
    </form>

    <div class="login-footer">
      <a routerLink="/login">← Volver al Login</a>
    </div>
  </div>
</div>
