<div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background-color: #fafafa; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  
  <div style="width: 100%; max-width: 450px; background: #ffffff; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 3rem; border: 1px solid #eaeaea;">
    
    <div style="text-align: center; margin-bottom: 2rem;">
      <h1 style="margin: 0; font-size: 1.8rem; font-weight: 700; color: #111;">VITAL VET</h1>
      <p style="margin: 0.5rem 0 0; color: #555; font-size: 0.9rem;">Restablecer Contraseña</p>
    </div>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
      
      <div style="margin-bottom: 1.2rem;">
        <label style="display: block; margin-bottom: 0.4rem; color: #444; font-size: 0.9rem;">Nueva Contraseña</label>
        <input type="password" formControlName="nuevaContrasenia" placeholder="Mínimo 6 caracteres"
               style="width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 6px; outline: none; box-sizing: border-box;">
      </div>

      <div style="margin-bottom: 0.5rem;">
        <label style="display: block; margin-bottom: 0.4rem; color: #444; font-size: 0.9rem;">Confirmar Nueva Contraseña</label>
        <input type="password" formControlName="confirmarContrasenia" placeholder="Repite la contraseña"
               style="width: 100%; padding: 0.75rem; border: 1px solid #d1d5db; border-radius: 6px; outline: none; box-sizing: border-box;">
      </div>

      @if (contraseniaNoCoincide) {
        <span style="color: #ef4444; font-size: 0.8rem; display: block; margin-bottom: 1.5rem;">Las contraseñas no coinciden.</span>
      } @else {
        <div style="margin-bottom: 2rem;"></div> 
      }

      <button type="submit" [disabled]="resetForm.invalid || cargando" 
              style="width: 100%; padding: 0.85rem; background: #222; color: #fff; border: none; border-radius: 6px; font-weight: 600; cursor: pointer;"
              [style.opacity]="(resetForm.invalid || cargando) ? '0.5' : '1'">
        {{ cargando ? 'Actualizando...' : 'Guardar Nueva Contraseña' }}
      </button>

    </form>

    <div style="text-align: center; border-top: 1px solid #eee; padding-top: 1.5rem; margin-top: 2rem;">
      <p style="margin: 0; font-size: 0.85rem; color: #666;">
        <a routerLink="/login" style="color: #111; font-weight: 700; text-decoration: none; cursor: pointer;">← Volver al Login</a>
      </p>
    </div>
    
  </div>
</div>
