<div class="modal-overlay" (click)="cerrar.emit()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    
    <div class="modal-header">
      <h2>{{ esModoEdicion ? 'Editar Veterinario' : 'Registrar Nuevo Veterinario' }}</h2>
      <button class="btn-close" (click)="cerrar.emit()">×</button>
    </div>

    @if (!esModoEdicion) {
        <p class="info-text">La contraseña del usuario por defecto será el número de DNI</p>
    }

    <form [formGroup]="formulario" (ngSubmit)="guardar()">
      <div class="grid-form">
        <div class="form-group"><label>Nombres</label><input type="text" formControlName="nombres"></div>
        <div class="form-group"><label>Apellidos</label><input type="text" formControlName="apellidos"></div>
        <div class="form-group"><label>DNI</label><input type="text" formControlName="dni"></div>
        <div class="form-group"><label>Celular</label><input type="text" formControlName="celular"></div>
        <div class="form-group full-width"><label>Correo Electrónico</label><input type="email" formControlName="email"></div>
        <div class="form-group">
            <label>Género</label>
            <select formControlName="genero">
                <option value="MASCULINO">MASCULINO</option>
                <option value="FEMENINO">FEMENINO</option>
            </select>
        </div>
        <div class="form-group"><label>Nº Colegiatura</label><input type="text" formControlName="numColegiatura"></div>
        <div class="form-group full-width">
            <label>Especialidad</label>
            <select formControlName="idEspecialidad">
                <option value="" disabled>SELECCIONE UNA ESPECIALIDAD</option>
                @for (esp of especialidades; track esp.idEspecialidad) {
                    <option [value]="esp.idEspecialidad">{{ esp.nombreEspecialidad }}</option>
                }
            </select>
        </div>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-cancel" (click)="cerrar.emit()">Cancelar</button>
        <button type="submit" class="btn-primary" [disabled]="cargando || formulario.invalid">
          {{ cargando ? 'Procesando...' : (esModoEdicion ? 'Actualizar' : 'Registrar') }}
        </button>
      </div>
    </form>
  </div>
</div>
