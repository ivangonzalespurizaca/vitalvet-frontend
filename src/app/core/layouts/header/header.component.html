<header class="header-container">
  <div class="header-left">
    <span class="brand">{{ titulo }}</span>
  </div>

  <div class="header-right">
    @if (usuario) {
      <div class="user-profile" [routerLink]="['/perfil']">
        <div class="user-info">
          <span class="user-name">{{ usuario.nombres }} {{ usuario.apellidos }}</span>
          <span class="user-role">{{ usuario.rol }}</span>
        </div>
        
        <div class="avatar" 
             [style.background-image]="usuario.fotoUrl ? 'url(' + usuario.fotoUrl + ')' : null">
          @if (!usuario.fotoUrl) {
            <span>{{ iniciales }}</span>
          }
        </div>
      </div>

      <button (click)="logout()" class="logout-btn">
        Cerrar Sesión
      </button>
    }
  </div>
</header>
